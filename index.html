<!DOCTYPE html>
<html>
<head>
<title>WebEd Dashboard</title>

<style>

body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px 20px;
cursor:pointer;
}

#dashboard{
display:none;
}

#loader{
display:none;
color:blue;
}

.site{
padding:6px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<h2>WebEd</h2>

<!-- LOGIN / SIGNUP -->

<div id="auth">

<h3>Login</h3>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<hr>

<h3>Sign Up</h3>

<input id="signupUser" placeholder="Username">
<input id="signupPass" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<h3>Publish Website 🚀</h3>

<input id="slug" placeholder="Website name (example: demo)">

<textarea id="code" rows="8" placeholder="Paste your HTML code"></textarea>

<button onclick="publishSite()">Publish</button>

<p id="loader">⏳ Please wait publishing...</p>

<hr>

<h3>My Sites</h3>

<div id="sitesList"></div>

<br>

<button onclick="logout()">Logout</button>

</div>

<script>

const API = "https://site.webed.in";

//////////////////////////////////////////////////
// LOGIN
//////////////////////////////////////////////////

async function login(){

const username=document.getElementById("loginUser").value;
const password=document.getElementById("loginPass").value;

const res=await fetch(API+"/login",{

method:"POST",

headers:{ "Content-Type":"application/json"},

body:JSON.stringify({username,password})

});

const data=await res.json();

if(data.userId){

localStorage.setItem("userId",data.userId);

showDashboard();

}else{

alert(data.error);

}

}

//////////////////////////////////////////////////
// SIGNUP
//////////////////////////////////////////////////

async function signup(){

const username=document.getElementById("signupUser").value;
const password=document.getElementById("signupPass").value;

const res=await fetch(API+"/signup",{

method:"POST",

headers:{ "Content-Type":"application/json"},

body:JSON.stringify({username,password})

});

const data=await res.json();

alert(data.message || data.error);

}

//////////////////////////////////////////////////
// DASHBOARD
//////////////////////////////////////////////////

function showDashboard(){

document.getElementById("auth").style.display="none";

document.getElementById("dashboard").style.display="block";

loadSites();

}

//////////////////////////////////////////////////
// LOGOUT
//////////////////////////////////////////////////

function logout(){

localStorage.removeItem("userId");

location.reload();

}

//////////////////////////////////////////////////
// PUBLISH
//////////////////////////////////////////////////

async function publishSite(){

const slug=document.getElementById("slug").value.trim();

const html=document.getElementById("code").value;

const userId=localStorage.getItem("userId");

if(!slug || !html){

alert("Enter site name and code");

return;

}

document.getElementById("loader").style.display="block";

const res=await fetch(API+"/publish",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({

slug:slug,

html:html,

userId:userId

})

});

const data=await res.json();

document.getElementById("loader").style.display="none";

alert(data.message || data.error);

loadSites();

}

//////////////////////////////////////////////////
// LOAD MY SITES
//////////////////////////////////////////////////

async function loadSites() {

  const container = document.getElementById("sitesList");
  container.innerHTML = "<p>⏳ Please wait loading your sites...</p>";

  const userId = localStorage.getItem("userId");

  try {

    const res = await fetch(API+`/mysites/${userId}`);
    const sites = await res.json();

    sites.forEach(site => {

      const div = document.createElement("div");
      div.className = "site-card";

      div.innerHTML = `
        <h3>${site}</h3>
        <a href="https://site.webed.in/${site}" target="_blank">Open</a>
      `;

      container.appendChild(div);

    });

  } catch (err) {
    console.error("Failed to load sites", err);
    container.innerHTML = "<p>Failed to load your sites. Please try again</p>";
  }

}

//////////////////////////////////////////////////
// AUTO LOGIN
//////////////////////////////////////////////////

if(localStorage.getItem("userId")){

showDashboard();

}

</script>

</body>
</html>
