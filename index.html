<!DOCTYPE html>
<html>
<head>
<title>WebEd Publisher</title>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
cursor:pointer;
}

#loader{
display:none;
color:blue;
}

.site{
padding:8px;
border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<h2>Publish Website 🚀</h2>

<input id="slug" placeholder="Website name (example: demo)">

<textarea id="code" rows="8" placeholder="Paste your HTML code"></textarea>

<button onclick="publishSite()">Publish</button>

<p id="loader">⏳ Please wait publishing...</p>

<h3>Live Websites</h3>

<div id="sitesList"></div>

<script>

async function publishSite(){

const slug = document.getElementById("slug").value.trim();
const html = document.getElementById("code").value;

if(!slug || !html){
alert("Enter site name and code");
return;
}

document.getElementById("loader").style.display="block";

const res = await fetch("https://site.webed.in/publish",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
slug:slug,
html:html
})
});

const data = await res.json();

document.getElementById("loader").style.display="none";

alert(data.message);

loadSites();

}

async function loadSites(){

const res = await fetch("https://site.webed.in/sites");

const sites = await res.json();

const container = document.getElementById("sitesList");

container.innerHTML="";

sites.forEach(site => {

const div = document.createElement("div");

div.className="site";

div.innerHTML = `
${site.id}. 
<a href="${site.url}" target="_blank">
${site.url}
</a>
`;

container.appendChild(div);

});

}

loadSites();

</script>

</body>
</html>
