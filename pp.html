<!DOCTYPE html>
<html>
<head>
  <title>HTML to Image</title>
</head>
<body>

<h2>Enter HTML Code</h2>

<textarea id="htmlInput" rows="10" cols="50">
<h1 style="color:red;">Hello Sahil 🚀</h1>
<p>This is Puppeteer Image</p>
</textarea>

<br><br>

<select id="deviceModel">
  <option value="mobile"></option>
  <option value="pc"></option>
</select>

<button onclick="generateImage()">Download Image</button>
<p id="loder"></p>

<script>
async function generateImage() {
  const html = document.getElementById('htmlInput').value;
  const deviceModel = document.getElementById('deviceModel').value;
  const l = document.getElementById("loder");

  const res = await fetch('https://site.webed.in/generate-image', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ html, deviceModel })
  });

  l.textContent = "please wait..";

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);
  
  l.textContent = "img created..";

  const a = document.createElement('a');
  a.href = url;
  a.download = 'output.png';
  a.click();
  l.textContent ="";
}
</script>

</body>
</html>
